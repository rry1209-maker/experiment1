<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>농도 변화에 따른 평형 이동 시뮬레이션</title>
    <style>
        body { 
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 2rem; 
        }
        h1 { color: #2c3e50; text-align: center; }
        .experiment-container { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            text-align: center; 
            max-width: 700px; 
            width: 100%; 
        }
        .equation { 
            font-size: 1.2rem; 
            margin-bottom: 2rem; 
            padding: 1.5rem; 
            background: #f8f9fa; 
            border-radius: 12px;
            font-weight: bold;
            color: #34495e;
            line-height: 1.6;
        }
        .highlight-orange { color: #d35400; }
        .highlight-yellow { color: #f1c40f; text-shadow: 0 0 1px #000; }
        
        .tube-container { 
            display: flex; 
            justify-content: center; 
            margin-bottom: 2.5rem; 
            position: relative; 
        }
        .test-tube { 
            width: 80px; 
            height: 300px; 
            border: 5px solid #bdc3c7; 
            border-top: none; 
            border-radius: 0 0 40px 40px; 
            position: relative; 
            overflow: hidden; 
            background: rgba(255, 255, 255, 0.5); 
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.05);
        }
        .test-tube::before {
            content: '';
            position: absolute;
            top: 0; left: 10px; right: 10px; bottom: 10px;
            border-radius: 0 0 30px 30px;
            background: linear-gradient(90deg, rgba(255,255,255,0.6) 0%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.2) 100%);
            z-index: 10;
            pointer-events: none;
        }
        .liquid { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            height: 70%; 
            /* 부드러운 색상 전환을 위한 트랜지션 효과 */
            transition: background-color 0.8s ease, height 0.3s ease; 
        }
        .controls { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        button { 
            padding: 12px 24px; 
            font-size: 1.1rem; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: white; 
            font-weight: bold; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.1); }
        .btn-hcl { background-color: #e74c3c; } /* 붉은색 계열 */
        .btn-hcl:hover { background-color: #c0392b; }
        .btn-naoh { background-color: #3498db; } /* 푸른색 계열 */
        .btn-naoh:hover { background-color: #2980b9; }
        .btn-reset { background-color: #95a5a6; }
        .btn-reset:hover { background-color: #7f8c8d; }
        
        .status { 
            margin-top: 2rem; 
            font-size: 1.2rem; 
            font-weight: bold; 
            color: #2c3e50; 
            background: #e1f0fa;
            padding: 1rem;
            border-radius: 8px;
        }
        .drop-counter {
            font-size: 1rem;
            color: #7f8c8d;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="experiment-container">
    <h1>농도 변화에 따른 평형 이동</h1>
    
    <div class="equation">
        <span class="highlight-orange">Cr₂O₇²⁻(aq) [주황색]</span> + H₂O(l) ⇌ 
        <span class="highlight-yellow">2CrO₄²⁻(aq) [노란색]</span> + 2H⁺(aq)
    </div>

    <div class="tube-container">
        <div class="test-tube">
            <div class="liquid" id="liquid"></div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-hcl" onclick="addReagent('HCl')">+ 1M HCl 추가</button>
        <button class="btn-reset" onclick="resetExperiment()">처음으로</button>
        <button class="btn-naoh" onclick="addReagent('NaOH')">+ 1M NaOH 추가</button>
    </div>

    <div class="status" id="status-text">
        현재 상태: 초기 평형 (다이크로뮴산 이온 우세, 주황색)
    </div>
    
    <div class="drop-counter" id="counter-text">
        첨가한 수용액: 없음
    </div>
</div>

<script>
    // 평형 상태 위치 (0: 완전 산성/주황색 ~ 10: 완전 염기성/노란색)
    let equilibriumPosition = 2; // 초기 K2Cr2O7 수용액은 약산성이므로 주황색에 가깝게 설정
    let dropsAdded = 0;
    let lastReagent = "";

    const maxPosition = 10;
    const minPosition = 0;

    const liquid = document.getElementById('liquid');
    const statusText = document.getElementById('status-text');
    const counterText = document.getElementById('counter-text');

    // 색상 보간 및 상태 업데이트 함수
    function updateSimulation() {
        const ratio = equilibriumPosition / maxPosition;

        // 주황색(255, 120, 0)에서 노란색(255, 230, 0)으로 그라데이션 변환
        const r = 255;
        const g = Math.floor(120 + (110 * ratio));
        const b = 0;

        liquid.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

        // 액체 높이 약간씩 증가 (용액이 추가되는 효과)
        const baseHeight = 65;
        liquid.style.height = `${baseHeight + (dropsAdded * 1.5)}%`;

        // 상태 설명 업데이트
        if (equilibriumPosition <= 3) {
            statusText.innerText = "상태: 역반응 우세 (다이크로뮴산 이온 많음, 주황색)";
        } else if (equilibriumPosition >= 7) {
            statusText.innerText = "상태: 정반응 우세 (크로뮴산 이온 많음, 노란색)";
        } else {
            statusText.innerText = "상태: 평형 이동 중 (중간색)";
        }

        // 카운터 업데이트
        if (dropsAdded === 0) {
            counterText.innerText = "첨가한 수용액: 없음";
        } else {
            counterText.innerText = `첨가 횟수: 총 ${dropsAdded}회 (최근 첨가: ${lastReagent})`;
        }
    }

    function addReagent(type) {
        if (dropsAdded >= 15) {
            alert("시험관이 가득 찼습니다. 초기화 후 다시 실험해주세요.");
            return;
        }

        dropsAdded++;
        lastReagent = type;

        if (type === 'NaOH') {
            // OH-가 H+와 반응하여 H+ 농도 감소 -> 정반응(오른쪽)으로 이동
            if (equilibriumPosition < maxPosition) equilibriumPosition += 2;
        } else if (type === 'HCl') {
            // H+ 농도 증가 -> 역반응(왼쪽)으로 이동
            if (equilibriumPosition > minPosition) equilibriumPosition -= 2;
        }
        
        // 위치값 제한
        if(equilibriumPosition > maxPosition) equilibriumPosition = maxPosition;
        if(equilibriumPosition < minPosition) equilibriumPosition = minPosition;

        updateSimulation();
    }

    function resetExperiment() {
        equilibriumPosition = 2;
        dropsAdded = 0;
        lastReagent = "";
        updateSimulation();
    }

    // 초기 상태 렌더링
    updateSimulation();
</script>
</body>
</html>
